# /etc/nginx/conf.d/msmsge.conf
# 80/443 → 로컬 Next.js(127.0.0.1:3000) 리버스 프록시.
# 아래는 `certbot --nginx` 실행 *전* 의 모습. certbot 이 listen 443 ssl / 인증서 경로 /
# 80→443 리다이렉트를 자동으로 덧붙인다. (실제 서버 파일은 certbot 이 수정한 상태)
server {
    listen 80;
    server_name msmsge.com www.msmsge.com;
    client_max_body_size 5m;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
