name: Deploy to EC2

# main 에 push 되면 EC2 로 SSH 접속해 코드 갱신 + 재빌드 + 재시작.
# prod (~/adventure-rpg) 와 test (~/adventure-rpg-test) 를 순차로 배포한다.
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST    — EC2 의 고정 IP 또는 도메인 (예: 54.180.28.29)
#   EC2_SSH_KEY — EC2 접속용 private key 전체 (msmsge-key.pem 의 내용)
on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 버튼

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            # set +o pipefail 명시 — systemctl | head 가 SIGPIPE 로 비-0 종료해도
            # 파이프라인 자체는 head 의 0 만 본다. 일부 appleboy 버전이 pipefail 을
            # 켜고 시작하는 경우가 보고됐어서 안전망.
            set +o pipefail

            ##############################
            # prod 배포 — 실패 시 워크플로 전체 실패.
            ##############################
            cd "$HOME/adventure-rpg"
            echo "▶ [prod] git update"
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main
            echo "▶ [prod] npm ci"
            npm ci
            echo "▶ [prod] db migrate"
            node --env-file=.env.production.local src/db/migrate.mjs
            echo "▶ [prod] build"
            npm run build
            echo "▶ [prod] restart"
            sudo systemctl restart adventure-rpg
            sleep 2
            (sudo systemctl --no-pager status adventure-rpg | head -n 4) || true
            echo "▶ [prod] health"
            curl -fsS -o /dev/null -w 'prod=%{http_code}\n' http://127.0.0.1:3000/api/health || true

            ##############################
            # test 배포 — best-effort. 디렉토리 없거나 실패해도 워크플로 자체는 계속.
            # (prod 가 이미 끝났는데 test 한 단계 때문에 빨간불이 되는 건 의미 없음.)
            ##############################
            TEST_DIR="$HOME/adventure-rpg-test"
            if [ -d "$TEST_DIR" ] && [ -r "$TEST_DIR" ] && [ -x "$TEST_DIR" ]; then
              echo "▶ [test] start ($TEST_DIR)"
              (
                set -e
                cd "$TEST_DIR"
                echo "▶ [test] git update"
                git fetch --prune origin
                git checkout main
                git reset --hard origin/main
                echo "▶ [test] npm ci"
                npm ci
                echo "▶ [test] db migrate"
                node --env-file=.env.production.local src/db/migrate.mjs
                echo "▶ [test] build"
                npm run build
                echo "▶ [test] restart"
                sudo systemctl restart adventure-rpg-test
                sleep 2
                (sudo systemctl --no-pager status adventure-rpg-test | head -n 4) || true
                echo "▶ [test] health"
                curl -fsS -o /dev/null -w 'test=%{http_code}\n' http://127.0.0.1:3001/api/health || true
              ) || echo "⚠ [test] 배포 단계 실패 — prod 는 정상, 다음 push 또는 수동 deploy-test.sh 로 재시도"
            else
              echo "▶ [test] skipped ($TEST_DIR 미존재/접근 불가)"
            fi
            echo "▶ done"
